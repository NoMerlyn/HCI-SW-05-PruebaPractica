  </linearGradient>
  <linearGradient id="heroOrb" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0.0"/>
  </linearGradient>
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.2" fill="#2563EB" fill-opacity="0.10"/>
  </pattern>
