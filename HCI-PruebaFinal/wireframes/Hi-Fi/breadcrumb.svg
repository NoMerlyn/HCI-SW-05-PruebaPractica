<svg xmlns="http://www.w3.org/2000/svg" width="720" height="80" viewBox="0 0 720 80" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"><defs>
  <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.06"/>
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0F172A" flood-opacity="0.04"/>
  </filter>
  <filter id="btnShadow" x="-20%" y="-20%" width="140%" height="140%">
